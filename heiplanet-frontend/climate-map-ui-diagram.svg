<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2560 1700" role="img" aria-labelledby="title desc">
  <title id="title">ClimateMap UI Component Diagram</title>
  <desc id="desc">UI-focused architecture diagram for ClimateMap showing input-side components at the top, ClimateMap and four key stores in the middle, and rendered map outputs at the bottom.</desc>
  <defs>
    <style>
      .bg { fill: #f4f7fb; }
      .panel { fill: #ffffff; stroke: #d9e1ec; stroke-width: 2; rx: 28; }
      .title { font: 700 42px 'Segoe UI', Arial, sans-serif; fill: #172033; }
      .subtitle { font: 16px 'Segoe UI', Arial, sans-serif; fill: #607089; }
      .panelTitle { font: 700 24px 'Segoe UI', Arial, sans-serif; fill: #1f2a44; }
      .component { fill: #eef4ff; stroke: #5b8def; stroke-width: 2.5; rx: 18; }
      .componentUi { fill: #fff1ef; stroke: #e76f51; stroke-width: 2.5; rx: 18; }
      .componentViewport { fill: #e9fbf6; stroke: #1f9d84; stroke-width: 2.5; rx: 18; }
      .store { fill: #f7efff; stroke: #8b5cf6; stroke-width: 2.5; rx: 18; }
      .output { fill: #fff6ea; stroke: #d9822b; stroke-width: 2.5; rx: 18; }
      .note { fill: #fff9e7; stroke: #e2b84a; stroke-width: 2; rx: 18; }
      .labelBg { fill: rgba(255, 255, 255, 0.95); stroke: #d9e1ec; stroke-width: 1.2; rx: 12; }
      .name { font: 700 16px 'Segoe UI', Arial, sans-serif; fill: #1f2940; }
      .small { font: 13px 'Segoe UI', Arial, sans-serif; fill: #617089; }
      .noteText { font: 14px 'Segoe UI', Arial, sans-serif; fill: #6b5521; }
      .step { font: 700 14px 'Segoe UI', Arial, sans-serif; fill: #3d4b63; }
      .arrowBlue { stroke: #355fa9; stroke-width: 3.5; fill: none; }
      .arrowPurple { stroke: #7a4ee0; stroke-width: 3.5; fill: none; }
      .arrowGreen { stroke: #1f9d84; stroke-width: 3.5; fill: none; }
      .arrowOrange { stroke: #d9822b; stroke-width: 3.5; fill: none; }
    </style>
    <marker id="arrowBlue" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M0 0 L14 7 L0 14 z" fill="#355fa9"/>
    </marker>
    <marker id="arrowPurple" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M0 0 L14 7 L0 14 z" fill="#7a4ee0"/>
    </marker>
    <marker id="arrowGreen" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M0 0 L14 7 L0 14 z" fill="#1f9d84"/>
    </marker>
    <marker id="arrowOrange" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M0 0 L14 7 L0 14 z" fill="#d9822b"/>
    </marker>
    <g id="icon-phone">
      <rect x="3" y="2" width="18" height="30" rx="5" fill="none" stroke="#5b8def" stroke-width="2"/>
      <rect x="8" y="6" width="8" height="1.8" rx="0.9" fill="#5b8def"/>
      <circle cx="12" cy="27" r="1.6" fill="#5b8def"/>
    </g>
    <g id="icon-map">
      <path d="M2 5l6-2 6 2 6-2v16l-6 2-6-2-6 2z" fill="none" stroke="#1f9d84" stroke-width="1.8" stroke-linejoin="round"/>
      <path d="M8 3v16M14 5v16" fill="none" stroke="#1f9d84" stroke-width="1.8" stroke-linecap="round"/>
    </g>
  </defs>

  <rect class="bg" x="0" y="0" width="2560" height="1700"/>
  <text class="title" x="70" y="78">ClimateMap UI Component Diagram</text>
  <text class="subtitle" x="70" y="108">Top: input-side components. Middle: ClimateMap orchestration and four key stores. Bottom: rendered map output.</text>

  <rect class="panel" x="60" y="150" width="2440" height="410"/>
  <rect class="panel" x="60" y="600" width="2440" height="560"/>
  <rect class="panel" x="60" y="1200" width="2440" height="430"/>

  <text class="panelTitle" x="92" y="194">Input Side</text>
  <text class="panelTitle" x="92" y="644">ClimateMap + Key Stores</text>
  <text class="panelTitle" x="92" y="1244">Output Side</text>

  <rect class="note" x="1910" y="174" width="544" height="54"/>
  <use href="#icon-phone" x="1934" y="184"/>
  <text class="noteText" x="1972" y="207">Phone icon marks mobile-only UI or a mobile-specific layout branch.</text>

  <!-- Input side -->
  <g>
    <rect class="componentUi" x="110" y="250" width="520" height="170"/>
    <text class="name" x="140" y="286">Header</text>
    <text class="small" x="140" y="314">Model selector + map mode selector</text>
    <text class="small" x="140" y="338">Reads and writes climate query state</text>
    <use href="#icon-phone" x="140" y="356"/>
    <text class="small" x="174" y="379">Owns a separate mobile layout inside the same component</text>

    <rect class="componentUi" x="690" y="250" width="820" height="190"/>
    <text class="name" x="720" y="286">BottomBar</text>
    <text class="small" x="720" y="314">Year / month selectors plus zoom, reset, locate, screenshot</text>
    <text class="small" x="720" y="338">Feeds date inputs and control callbacks back into ClimateMap</text>
    <text class="small" x="720" y="362">Desktop uses a wide control row; mobile stacks controls and carries the inline legend</text>
    <use href="#icon-phone" x="720" y="380"/>
    <text class="small" x="754" y="403">Explicit mobile layout branch inside BottomBar</text>

    <rect class="componentUi" x="1570" y="250" width="390" height="120"/>
    <use href="#icon-phone" x="1600" y="268"/>
    <text class="name" x="1642" y="294">MobileSideButtons</text>
    <text class="small" x="1642" y="318">Mobile-only floating actions for zoom, locate, info, screenshot</text>

    <rect class="componentViewport" x="1990" y="250" width="430" height="120"/>
    <use href="#icon-map" x="2020" y="272"/>
    <text class="name" x="2052" y="294">ViewportMonitor</text>
    <text class="small" x="2052" y="318">Pushes pan/zoom-derived bounds, zoom, and resolution</text>

    <path class="arrowBlue" marker-end="url(#arrowBlue)" d="M370 420 L1120 760"/>
    <rect class="labelBg" x="534" y="518" width="252" height="28"/>
    <text class="step" x="558" y="537">model + mode input path</text>

    <path class="arrowBlue" marker-end="url(#arrowBlue)" d="M1100 440 L1250 760"/>
    <rect class="labelBg" x="1084" y="560" width="214" height="28"/>
    <text class="step" x="1104" y="579">date + control callbacks</text>

    <path class="arrowBlue" marker-end="url(#arrowBlue)" d="M1764 370 L1450 760"/>
    <rect class="labelBg" x="1522" y="516" width="236" height="28"/>
    <text class="step" x="1546" y="535">mobile-only map actions</text>

    <path class="arrowGreen" marker-end="url(#arrowGreen)" d="M2206 370 L450 930"/>
    <rect class="labelBg" x="1674" y="634" width="326" height="28"/>
    <text class="step" x="1696" y="653">viewport writes bounds + zoom + resolution</text>
  </g>

  <!-- ClimateMap and stores -->
  <g>
    <rect class="store" x="120" y="720" width="620" height="136"/>
    <text class="name" x="150" y="756">UserSelectionsForClimateQueryStore</text>
    <text class="small" x="150" y="784">selectedModel, currentYear, currentMonth, currentVariableType, mapMode</text>
    <text class="small" x="150" y="808">Primary query input store touched by Header and BottomBar</text>

    <rect class="store" x="120" y="900" width="620" height="132"/>
    <text class="name" x="150" y="936">MapViewportInputsStore</text>
    <text class="small" x="150" y="964">mapViewportBounds, mapZoomLevel, dataResolution</text>
    <text class="small" x="150" y="988">Only matters for grid requests and zoom-dependent rendering</text>

    <rect class="component" x="860" y="760" width="840" height="220"/>
    <text class="name" x="1172" y="800">ClimateMap</text>
    <text class="small" x="938" y="836">Root map screen that wires Header, BottomBar, MapContainer, MapLayers, ViewportMonitor,</text>
    <text class="small" x="938" y="860">LoadingSkeleton, NoDataModal, Footer, and the device split through isMobile.</text>
    <text class="small" x="938" y="900">Runs useClimateDataLoader, owns local processedDataExtremes for the legend,</text>
    <text class="small" x="938" y="924">and binds the shared Leaflet map instance through MapDisplayedDataStore.</text>

    <rect class="store" x="1820" y="720" width="620" height="136"/>
    <text class="name" x="1850" y="756">MapUIInteractionsStore</text>
    <text class="small" x="1850" y="784">generalError, dataProcessingError, noDataModalVisible, mapScreenshoter, hover state</text>
    <text class="small" x="1850" y="808">Transient feedback and interaction state that ClimateMap surfaces to the user</text>

    <rect class="store" x="1820" y="900" width="620" height="164"/>
    <text class="name" x="1850" y="936">MapDisplayedDataStore</text>
    <text class="small" x="1850" y="964">leafletMapInstance, isLoadingRawData, isProcessingEuropeNutsData</text>
    <text class="small" x="1850" y="988">processedEuropeNutsRegions, gridCells, countryBoundaryOverlay</text>
    <text class="small" x="1850" y="1012">Renderable map state for both NUTS and grid outputs</text>

    <path class="arrowPurple" marker-end="url(#arrowPurple)" d="M860 820 L740 800"/>
    <rect class="labelBg" x="708" y="766" width="176" height="28"/>
    <text class="step" x="724" y="785">query state in/out</text>

    <path class="arrowPurple" marker-end="url(#arrowPurple)" d="M860 930 L740 960"/>
    <rect class="labelBg" x="702" y="924" width="194" height="28"/>
    <text class="step" x="718" y="943">grid viewport input</text>

    <path class="arrowPurple" marker-end="url(#arrowPurple)" d="M1700 820 L1820 800"/>
    <rect class="labelBg" x="1646" y="766" width="168" height="28"/>
    <text class="step" x="1664" y="785">feedback state</text>

    <path class="arrowPurple" marker-end="url(#arrowPurple)" d="M1700 930 L1820 980"/>
    <rect class="labelBg" x="1638" y="952" width="184" height="28"/>
    <text class="step" x="1658" y="971">renderable data</text>

    <rect class="note" x="860" y="1010" width="840" height="110"/>
    <text class="noteText" x="892" y="1046">UI focus only: LoadingStore and GridProcessingStore sit behind useClimateDataLoader.</text>
    <text class="noteText" x="892" y="1072">They still matter, but this diagram keeps the visible UI shell and its primary store edges on one screen.</text>
  </g>

  <!-- Output side -->
  <g>
    <rect class="output" x="120" y="1300" width="660" height="170"/>
    <text class="name" x="322" y="1338">Leaflet Map Rendering</text>
    <text class="small" x="150" y="1368">MapContainer plus the shared leafletMapInstance, zoom controls, and device layout width.</text>
    <text class="small" x="150" y="1392">Desktop keeps a left gutter; mobile uses a full-width map.</text>

    <rect class="output" x="930" y="1300" width="700" height="170"/>
    <text class="name" x="1152" y="1338">Mode-Specific Layers</text>
    <text class="small" x="960" y="1368">MapLayers renders the Europe-only GeoJSON layer or the grid branch.</text>
    <text class="small" x="960" y="1392">Grid uses AdaptiveGridLayer plus the country boundary overlay.</text>

    <rect class="output" x="1780" y="1300" width="660" height="170"/>
    <text class="name" x="2046" y="1338">Legend</text>
    <text class="small" x="1810" y="1368">processedDataExtremes are owned locally in ClimateMap, not in a store.</text>
    <text class="small" x="1810" y="1392">Desktop shows an overlay; mobile passes the legend into BottomBar.</text>
    <use href="#icon-phone" x="1810" y="1410"/>
    <text class="small" x="1844" y="1433">Legend placement changes with the mobile branch</text>

    <path class="arrowOrange" marker-end="url(#arrowOrange)" d="M1120 980 L450 1300"/>
    <rect class="labelBg" x="628" y="1128" width="268" height="28"/>
    <text class="step" x="648" y="1147">shared map shell output</text>

    <path class="arrowPurple" marker-end="url(#arrowPurple)" d="M2130 1064 L1280 1300"/>
    <rect class="labelBg" x="1624" y="1144" width="256" height="28"/>
    <text class="step" x="1644" y="1163">NUTS or grid layer payload</text>

    <path class="arrowOrange" marker-end="url(#arrowOrange)" d="M1440 980 L2110 1300"/>
    <rect class="labelBg" x="1638" y="1120" width="258" height="28"/>
    <text class="step" x="1658" y="1139">legend render decision</text>
  </g>

</svg>
