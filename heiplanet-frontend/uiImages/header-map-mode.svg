<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 367 118" role="img" aria-labelledby="title desc">
  <title id="title">Header map mode selector</title>
  <desc id="desc">Purple UI snippet showing a map icon and a Europe-only select control.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8f8be1"/>
      <stop offset="100%" stop-color="#7a73cc"/>
    </linearGradient>
    <style>
      .bg { fill: url(#bg); }
      .panel { fill: rgba(255, 255, 255, 0.08); stroke: rgba(255, 255, 255, 0.32); stroke-width: 2; }
      .field { fill: rgba(255, 255, 255, 0.06); stroke: rgba(255, 255, 255, 0.22); stroke-width: 2; }
      .value { font: 400 27px 'Segoe UI', Arial, sans-serif; fill: #ffffff; }
      .icon { stroke: #ffffff; stroke-width: 4; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .chevron { stroke: #ffffff; stroke-width: 4; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <rect class="bg" width="367" height="118"/>
  <rect class="panel" x="11" y="20" width="345" height="84" rx="20"/>
  <path class="icon" d="M46 49l11-4 10 4 11-4v28l-11 4-10-4-11 4z"/>
  <path class="icon" d="M57 45v32M67 49v28"/>
  <rect class="field" x="108" y="44" width="201" height="42" rx="14"/>
  <text class="value" x="128" y="72">Europe-only</text>
  <path class="chevron" d="M279 59l8 9 8-9"/>
</svg>
