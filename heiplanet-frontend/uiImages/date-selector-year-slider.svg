<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 736 151" role="img" aria-labelledby="title desc">
  <title id="title">DateSelector year slider</title>
  <desc id="desc">Purple UI snippet showing a year slider with a draggable knob and year markers.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7f86df"/>
      <stop offset="100%" stop-color="#7466bf"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="2" flood-color="#51479a" flood-opacity="0.45"/>
    </filter>
    <style>
      .bg { fill: url(#bg); }
      .track { stroke: rgba(255, 255, 255, 0.55); stroke-width: 10; stroke-linecap: round; }
      .tick { stroke: rgba(255, 255, 255, 0.75); stroke-width: 4; stroke-linecap: round; }
      .label { font: 700 30px 'Segoe UI', Arial, sans-serif; fill: #ffffff; }
      .knob { fill: #ffffff; stroke: #d6d8ef; stroke-width: 3; }
    </style>
  </defs>

  <rect class="bg" width="736" height="151"/>
  <line class="track" x1="0" y1="56" x2="736" y2="56"/>
  <line class="tick" x1="273" y1="42" x2="273" y2="66"/>
  <line class="tick" x1="636" y1="42" x2="636" y2="66"/>
  <circle class="knob" cx="364" cy="56" r="20" filter="url(#softShadow)"/>
  <text class="label" x="240" y="106">2020</text>
  <text class="label" x="603" y="106">2040</text>
</svg>
