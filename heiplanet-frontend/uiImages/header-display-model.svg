<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 468 118" role="img" aria-labelledby="title desc">
  <title id="title">Header display and model selector</title>
  <desc id="desc">Purple UI snippet showing a Display label and a WNV-RO select control.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8f8be1"/>
      <stop offset="100%" stop-color="#7a73cc"/>
    </linearGradient>
    <style>
      .bg { fill: url(#bg); }
      .panel { fill: rgba(255, 255, 255, 0.08); stroke: rgba(255, 255, 255, 0.32); stroke-width: 2; }
      .field { fill: rgba(255, 255, 255, 0.06); stroke: rgba(255, 255, 255, 0.22); stroke-width: 2; }
      .label { font: 500 28px 'Segoe UI', Arial, sans-serif; fill: #ffffff; }
      .value { font: 400 30px 'Segoe UI', Arial, sans-serif; fill: #ffffff; }
      .chevron { stroke: #ffffff; stroke-width: 4; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <rect class="bg" width="468" height="118" rx="0"/>
  <rect class="panel" x="14" y="20" width="440" height="84" rx="20"/>
  <text class="label" x="48" y="73">Display</text>
  <rect class="field" x="178" y="40" width="250" height="44" rx="16"/>
  <text class="value" x="241" y="70">WNV-RO</text>
  <path class="chevron" d="M371 56l9 10 9-10"/>
</svg>
