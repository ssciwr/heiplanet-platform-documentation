site_name: Heiplanet Platform Documentation
repo_url: https://github.com/ssciwr/heiplanet-platform-documentation
repo_name: "ssciwr/heiplanet-platform-documentation"
copyright: Copyright &copy; 2025, Scientific Software Center, Heidelberg University.

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.instant
    - palette.toggle
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

nav:
  - Overview: index.md
  - Heiplanet database: '!include ./heiplanet-db/mkdocs.yml'
  - Heiplanet data: '!include ./heiplanet-data/mkdocs.yml'
  - Heiplanet models: '!include ./heiplanet-models/mkdocs.yml'
  - Heiplanet frontend: '!include ./heiplanet-frontend/mkdocs.yml'

plugins:
  - search
  - monorepo
  - include-markdown
